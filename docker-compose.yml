services:
  db:
    image: postgres:15-alpine
    container_name: kombee_db
    environment:
      POSTGRES_DB: kombee_hackathon
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hackathon -d kombee_hackathon" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kombee_app
    environment:
      DATABASE_URL: postgresql://hackathon:hackathon123@db:5432/kombee_hackathon
      JWT_SECRET: kombee-super-secret-jwt-key-2024-hackathon
      PORT: 3001
      NODE_ENV: production
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      OTEL_SERVICE_NAME: kombee-backend
      LOKI_HOST: http://loki:3100
      ANOMALY_SLOW_QUERY: "false"
      ANOMALY_N_PLUS_ONE: "false"
      ANOMALY_RANDOM_ERRORS: "false"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3001/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kombee_frontend
    ports:
      - "80:80"
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:latest
    container_name: kombee_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  loki:
    image: grafana/loki:2.9.0
    container_name: kombee_loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/config.yml
    command: -config.file=/etc/loki/config.yml

  tempo:
    image: grafana/tempo:2.2.0
    container_name: kombee_tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml
    command: -config.file=/etc/tempo.yml

  grafana:
    image: grafana/grafana:10.0.0
    container_name: kombee_grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  postgres_data:
  grafana_data:
